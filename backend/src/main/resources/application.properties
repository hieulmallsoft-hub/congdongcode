spring.application.name=codetogether
server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/codetogether}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:change-this-secret-key-change-this-secret-key-123456}
app.jwt.expiration-ms=86400000
app.admin.email=${ADMIN_EMAIL:}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
app.rate-limit.auth.max-requests=${RATE_LIMIT_AUTH_MAX_REQUESTS:10}
app.rate-limit.auth.window-seconds=${RATE_LIMIT_AUTH_WINDOW_SECONDS:60}
app.rate-limit.write.max-requests=${RATE_LIMIT_WRITE_MAX_REQUESTS:40}
app.rate-limit.write.window-seconds=${RATE_LIMIT_WRITE_WINDOW_SECONDS:60}

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false
